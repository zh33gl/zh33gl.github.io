<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Vue Demo</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/index.css">
  </head>
  <body>
    <div id="app" class="flex">
      <header class="page-header">
        <h1>Vue Demo</h1>
        <div>
          <ul class="category" @click="openCategory">
            <li v-for="cate in categories" class="seti" :class="cate.cls" :data-href="cate.href">
              {{cate.title}}
            </li>
          </ul>
        </div>
        <div class="copyright">&copy; zhgl</div>
      </header>
      <main class="page-body">
        <div class="page-content" v-text="content"></div>
      </main>
    </div>
    <script src="https://cdn.bootcss.com/vue/2.0.1/vue.js"></script>
    <script src="https://cdn.bootcss.com/vue-router/2.0.0/vue-router.min.js"></script>
    <script src="https://cdn.bootcss.com/vue-resource/1.0.3/vue-resource.min.js"></script>
    <script src="./js/index.js"></script>
  </body>
</html>
